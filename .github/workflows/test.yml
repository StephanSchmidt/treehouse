name: Test Features

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test human feature
        run: devcontainer features test -f human -i mcr.microsoft.com/devcontainers/base:ubuntu .

  test-scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test human scenarios
        run: devcontainer features test -f human --skip-autogenerated --skip-duplicated .
